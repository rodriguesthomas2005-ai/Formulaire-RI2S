# --- NOM DE L'APPLICATION ---
spring.application.name=Formulaire-RI2S

# --- CONFIGURATION DU PORT (OBLIGATOIRE POUR RENDER) ---
# Render injecte dynamiquement le port via la variable d'environnement PORT
server.port=${PORT:8080}

# --- CONFIGURATION BASE DE DONNÉES (POSTGRESQL) ---
# On utilise la variable JDBC_DATABASE_URL que tu as créée sur le dashboard Render
spring.datasource.url=${JDBC_DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- CONFIGURATION JPA / HIBERNATE ---
# 'update' permet de modifier le schéma sans supprimer les données existantes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# On laisse Spring choisir le dialecte automatiquement (évite les warnings dans les logs)
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- INITIALISATION DES DONNÉES (DATA.SQL) ---
# 1. On force l'exécution du script data.sql à chaque démarrage
spring.sql.init.mode=always

# 2. OPTION A : On ignore les erreurs si les données existent déjà (évite le crash)
spring.sql.init.continue-on-error=true

# 3. On demande à Hibernate de créer les tables AVANT de lancer le script data.sql
spring.jpa.defer-datasource-initialization=true

# --- LOGS ET CONSOLE ---
# Désactivation de la console H2 car on est sur PostgreSQL (Production)
spring.h2.console.enabled=false
# Affiche les requêtes SQL dans les logs Render pour le débogage
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- SÉCURITÉ / PERFORMANCES ---
# Désactive le warning 'open-in-view' (optionnel mais plus propre)
spring.jpa.open-in-view=false


