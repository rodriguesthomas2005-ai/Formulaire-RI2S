spring.application.name=Formulaire-RI2S

# Configuration de la source de données H2
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=SA
spring.datasource.password=

# --- LA MAGIE EST ICI ---
# 1. On dit à Hibernate de supprimer et recréer les tables à chaque démarrage
spring.jpa.hibernate.ddl-auto=create-drop

# 2. On dit à Spring Boot d'attendre qu'Hibernate ait fini...
spring.jpa.defer-datasource-initialization=true

# 3. ... et de TOUJOURS exécuter data.sql après !
#spring.sql.init.mode=always

# Console H2 et Logs
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true